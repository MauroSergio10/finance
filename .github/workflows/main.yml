name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Instalar Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build com Maven
        working-directory: backend/transaction-service
        run: mvn clean package -DskipTests

      - name: Login no Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build da imagem Docker
        working-directory: backend/transaction-service
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/transaction-app:${{ github.sha }} .
          docker tag ${{ secrets.DOCKER_USERNAME }}/transaction-app:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/transaction-app:latest

      - name: Push da imagem
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/transaction-app:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/transaction-app:latest

      - name: Instalar kubectl
        uses: azure/setup-kubectl@v3

      - name: Deploy no Kubernetes
        run: kubectl apply -f k8s/