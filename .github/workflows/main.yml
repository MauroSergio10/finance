
name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v2

      - name: Configurar credenciais AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: sa-east-1
        
      - name: Login no ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build da imagem
        run: |
          docker build -t dockerfile ./transaction/backend/transaction-service
          docker tag dockerfile:latest 854929212314.dkr.ecr.sa-east-1.amazonaws.com/transaction-service:latest
          
      - name: Push da imagem
        run: |
          docker push 854929212314.dkr.ecr.sa-east-1.amazonaws.com/transaction-service:latest
          
      - name: Deploy no EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user
            ./deploy.sh
